name: flutter_app_2026
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2

  # 状態管理（Riverpod 3.x）
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # イミュータブルなデータモデル（Freezed 3.x）
  freezed_annotation: ^3.1.0

  # firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0

  # ルーティング
  go_router: ^14.6.3

  # ログ出力
  talker_flutter: ^5.1.16
  talker_riverpod_logger: ^5.1.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # コード生成（dev のみ）
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5

flutter:
  uses-material-design: true
